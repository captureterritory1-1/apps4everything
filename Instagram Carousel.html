<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Builder Log · IG Carousel</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,900&family=Bagel+Fat+One&family=Yeseva+One&family=Bowlby+One+SC&family=Climate+Crisis&family=Instrument+Serif:ital@0;1&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; color: #eee;
               font-family: 'JetBrains Mono', ui-monospace, monospace; }
  * { box-sizing: border-box; }
  em { font-style: normal; font-weight: 700;
       background: #F5D547;
       padding: 0 8px;
       border-radius: 2px;
       -webkit-text-fill-color: #0F1418;
       color: #0F1418; }
  @keyframes blink { 0%, 50% { opacity: 1 } 51%, 100% { opacity: 0.2 } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="slides.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "displayFont": "Fraunces",
  "bodyFont": "JetBrains Mono",
  "light": false,
  "grain": 0
}/*EDITMODE-END*/;

const DISPLAY_FONTS = {
  "Fraunces":          "'Fraunces', serif",
  "Bagel Fat One":     "'Bagel Fat One', cursive",
  "Yeseva One":        "'Yeseva One', serif",
  "Bowlby One SC":     "'Bowlby One SC', sans-serif",
  "Climate Crisis":    "'Climate Crisis', sans-serif",
  "DM Serif Display":  "'DM Serif Display', serif",
};
const BODY_FONTS = {
  "Instrument Serif":  "'Instrument Serif', serif",
  "Fraunces":          "'Fraunces', serif",
  "DM Serif Display":  "'DM Serif Display', serif",
  "JetBrains Mono":    "'JetBrains Mono', ui-monospace, monospace",
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tweaks = {
    displayFont: DISPLAY_FONTS[t.displayFont] || DISPLAY_FONTS["Fraunces"],
    font: BODY_FONTS[t.bodyFont] || BODY_FONTS["Instrument Serif"],
    light: t.light,
    grain: (t.grain || 0) / 100,
    logos: {
      'capture.territory': 'assets/logos/capture.png',
    },
  };

  return (
    <>
      <DesignCanvas title="Builder Log · IG Carousel" subtitle="6 slides · 1080×1350 · B&W">
        <DCSection id="set" title="Carousel — drag to reorder, click any slide to focus">
          {CarouselSlides({ tweaks })}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Type"/>
        <TweakSelect label="Display font" value={t.displayFont}
                     options={Object.keys(DISPLAY_FONTS)}
                     onChange={(v) => setTweak('displayFont', v)}/>
        <TweakSelect label="Body font" value={t.bodyFont}
                     options={Object.keys(BODY_FONTS)}
                     onChange={(v) => setTweak('bodyFont', v)}/>

        <TweakSection label="Finish"/>
        <TweakToggle label="Invert (light on dark)" value={t.light}
                     onChange={(v) => setTweak('light', v)}/>
        <TweakSlider label="Grain" value={t.grain} min={0} max={40} unit="%"
                     onChange={(v) => setTweak('grain', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
